---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: moup-app
  annotations:
    #######################
    # Argo CD Image Updater
    # This will always use the newest tag
    argocd-image-updater.argoproj.io/image-list: jadenkhuu/moup-app
    # This will checkout the `main` branch and commit/push change into the `argo-cd-image-updater` branch
    # In this repo, there is a GitHub Actions workflow that will auto create a PR when there is a push to this branch.
    argocd-image-updater.argoproj.io/git-branch: main:argo-cd-image-updater
    # Format is using `secret:<namespace>/<secret-name>`
    # Repo is added to Argo via the console and secret name is retrieved using the following:
    # $ kubectl get secrets -n argocd -l argocd.argoproj.io/secret-type=repository
    argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/repo-1786642865
spec:
  project: default
  source:
    repoURL: git@github.com:jadenkhuu/moup.git
    targetRevision: main
    path: chart
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
