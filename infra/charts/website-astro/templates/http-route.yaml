---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-{{ .Release.Namespace }}-httproute
spec:
  parentRefs:
    - name: {{ .Values.gateway.parentRefsName }}
      namespace: {{ .Values.gateway.parentRefsNamespace }}
  hostnames:
    - {{ .Values.ingress.host }}
  rules:
    - backendRefs:
        - name: {{ .Release.Name }}-{{ .Release.Namespace }}-svc
          port: 80
