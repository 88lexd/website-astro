---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kgateway
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: cr.kgateway.dev/kgateway-dev/charts
      chart: kgateway
      targetRevision: v2.2.1
      helm:
        skipCrds: false
        # Technically can use `valuesObject` but also wanted to show that values can be defined elsewhere
        valueFiles:
          - $values/infra/charts/kgateway/values.yaml
    - repoURL: https://github.com/88lexd/website-astro
      targetRevision: HEAD
      ref: values
  destination:
    namespace: kgateway-system
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      # Prune resources during auto-syncing (default is false)
      prune: true
    syncOptions:
    - CreateNamespace=true
